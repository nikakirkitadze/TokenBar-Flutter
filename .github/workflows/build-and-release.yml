name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────── Windows ───────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release
      - run: dart run msix:create --store

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenbar-windows-msix
          path: build/windows/x64/runner/Release/*.msix

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: tokenbar-windows-portable
          path: build/windows/x64/runner/Release/

  # ─────────────────────────── Linux ─────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/tokenbar-linux-x64.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenbar-linux-x64
          path: tokenbar-linux-x64.tar.gz

  # ──────────────── Publish to Microsoft Store ───────────────────
  publish-store:
    runs-on: windows-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tokenbar-windows-msix
          path: msix

      - name: Install Microsoft Store CLI
        run: winget install "Microsoft Store Developer CLI" --accept-package-agreements --accept-source-agreements

      - name: Publish to Microsoft Store
        env:
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
        run: msstore publish msix/

  # ──────────────── GitHub Release (public repo) ─────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tokenbar-windows-msix
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: tokenbar-linux-x64
          path: artifacts

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo nikakirkitadze/Tokenbar \
            --title "TokenBar $TAG" \
            --notes "## Downloads

          - **Windows**: Download the \`.msix\` installer
          - **Linux**: Download the \`.tar.gz\` and extract

          ## Install

          **Windows (MSIX)**:
          Double-click the .msix file to install.

          **Linux**:
          \`\`\`bash
          tar xzf tokenbar-linux-x64.tar.gz
          ./tokenbar_flutter
          \`\`\`" \
            artifacts/*.msix \
            artifacts/*.tar.gz
